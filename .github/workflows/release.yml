name: release

# runs when a tag v* is pushed
# releases the extension to GitHub and the vscode marketplace

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"
      - "Enhanced_v[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: write

env:
  SCRIPT_DIR: ./.github/scripts

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: node $SCRIPT_DIR/enableWebpack.js
      - run: npm install
      - uses: lannonbr/vsce-action@4.0.0
        with:
          args: "package"
      - name: Identify output file # can be retrieved as steps.filenames.outputs.file_out
        id: filenames
        run: echo "file_out=$(find . -maxdepth 1 -name '*.vsix' -print -quit | sed 's#^\./##')" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.filenames.outputs.file_out }}
          path: ${{ steps.filenames.outputs.file_out }}

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4.1.7
        with:
          path: "artifacts/"
      - name: Get version from tag
        id: get_version
        run: |
          tag="${GITHUB_REF_NAME}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${tag##*v}" >> "$GITHUB_OUTPUT"
      - name: Extract release notes from changelog
        run: |
          version="${{ steps.get_version.outputs.version }}"
          extract_section() {
            awk -v heading="$1" '
              /^##[[:space:]]+/ {
                current = $0
                sub(/^##[[:space:]]+/, "", current)
                sub(/[[:space:]]+-.*$/, "", current)
                if (current == heading) {
                  in_section = 1
                  next
                }
                if (in_section) {
                  exit
                }
              }
              in_section { print }
            ' CHANGELOG.md
          }
          extract_section "$version" > release-notes.md
          if ! grep -q '[^[:space:]]' release-notes.md; then
            extract_section "Unreleased" > release-notes.md
          fi
          if ! grep -q '[^[:space:]]' release-notes.md; then
            echo "::error::CHANGELOG.md does not contain a section for ${version} or Unreleased."
            exit 1
          fi
      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.get_version.outputs.tag }}" artifacts/*/* \
            --title "${{ steps.get_version.outputs.tag }}" \
            --notes-file release-notes.md \
            --verify-tag


  publish:
    name: Publish
    needs: release
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: node $SCRIPT_DIR/enableWebpack.js
      - run: npm install
      - name: Publish to Open VSX Registry
        uses: HaaLeo/publish-vscode-extension@v1
        id: publishToOpenVSX
        with:
          pat: ${{ secrets.OPEN_VSX_TOKEN }}
      - name: Publish to Visual Studio Marketplace
        uses: HaaLeo/publish-vscode-extension@v1
        with:
          pat: ${{ secrets.VSCE_TOKEN }}
          registryUrl: https://marketplace.visualstudio.com
          extensionFile: ${{ steps.publishToOpenVSX.outputs.vsixPath }}
